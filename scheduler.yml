name: Scheduler

on:
  schedule:
    - cron: '0 8 * * *'
    - cron: '0 14 * * *'

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Stock Monitor
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'stock-monitor.yml',
              ref: 'main'
            })
