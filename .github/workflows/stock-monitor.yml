name: Stock Monitor v4

on:
  schedule:
  - cron: '0 8 * * *'
  - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance feedparser requests pandas beautifulsoup4 lxml

      - name: Run Stock Monitor
        run: python scripts/monitor.py

      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Stock Monitor Bot"
          git add -A
          git commit -m "Stock Monitor - $(date -u +'%Y-%m-%d %H:%M UTC')" || echo "No changes"
          git push

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
