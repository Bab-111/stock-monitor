name: Stock Monitor

on:
  schedule:
    # 4 PM Taiwan Time (8 AM UTC)
    - cron: '0 8 * * 1-5'
    # 10 PM Taiwan Time (2 PM UTC)  
    - cron: '0 14 * * 1-5'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run stock monitor
        run: python scripts/monitor.py
        env:
          TZ: Asia/Taipei

      - name: Commit and push changes
        run: |
          git config user.name "Stock Monitor Bot"
          git config user.email "bot@users.noreply.github.com"
          git add -A
          
          if ! git diff --cached --quiet; then
            git commit -m "📊 Stock report - $(TZ='Asia/Taipei' date '+%Y-%m-%d %H:%M TW')"
            git push
            echo "✅ Report pushed successfully"
          else
            echo "ℹ️ No changes to commit"
          fi
        env:
          TZ: Asia/Taipei
